<!DOCTYPE html>
<html>
<head>
  <title>Pro Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <h2>⚡ NetSecure</h2>
  <a onclick="showSection('dashboard')">📊 Dashboard</a>
  <a onclick="showSection('analytics')">📈 Analytics</a>
  <a onclick="showSection('security')">🔐 Security</a>
</div>

<!-- Main -->
<div class="main">

  <!-- Navbar -->
  <div class="navbar">
    <span class="menu" onclick="toggleSidebar()">☰</span>

    <input type="text" placeholder="Search..." />

    <div class="nav-right">

      <!-- Notification -->
      <div class="notification" onclick="toggleNotification()">
        🔔
        <span id="badge" class="badge">0</span>

        <div id="notificationMenu" class="dropdown">
          <p><b>Notifications</b></p>
          <ul id="notificationList"></ul>
        </div>
      </div>

      <!-- Profile -->
      <div class="profile" onclick="toggleProfile()">
        👤
        <div id="profileMenu" class="dropdown">
          <p>Profile</p>
          <p onclick="logout()">Logout</p>
        </div>
      </div>

    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="section active">

    <div class="cards">
      <div class="card glass">
        <h3>Status</h3>
        <p id="status">🟢 Online</p>
      </div>

      <div class="card glass">
        <h3>Traffic</h3>
        <p id="traffic">0 Mbps</p>
      </div>

      <div class="card glass">
        <h3>Alerts</h3>
        <p id="alert">Normal</p>
      </div>
    </div>

    <canvas id="chart"></canvas>
  </div>

  <!-- Analytics -->
  <div id="analytics" class="section">
    <h2>📈 Analytics</h2>
    <p>Total Requests: <span id="requests">0</span></p>
  </div>

  <!-- Security -->
  <div id="security" class="section">
    <h2>🔐 Security Logs</h2>
    <ul id="logs"></ul>
  </div>

</div>

<script src="dashboard.js"></script>
</body>
</html>
